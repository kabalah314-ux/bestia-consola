<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>CONSOLA · LA BESTIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  :root{ --grn:#33ff66; --grn-dim:#1a8a38; --amber:#ffb000; --red:#ff3b30; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:#050805; color:var(--grn);
    font-family:'VT323', 'Courier New', monospace;
    overflow:hidden; -webkit-user-select:none; user-select:none;
    display:flex; align-items:center; justify-content:center;
    text-shadow:0 0 6px rgba(51,255,102,.55);
  }
  /* CRT overlays */
  body::before{ /* scanlines */
    content:""; position:fixed; inset:0; pointer-events:none; z-index:9;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,.28) 3px, rgba(0,0,0,.28) 3px);
  }
  body::after{ /* vignette + flicker */
    content:""; position:fixed; inset:0; pointer-events:none; z-index:8;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,.6) 100%);
    animation:flick 6s infinite steps(60);
  }
  @keyframes flick{ 0%,97%{opacity:1} 98%{opacity:.85} 99%{opacity:1} }
  .crt{ width:100%; max-width:560px; padding:26px 22px 38px; position:relative; z-index:1; }

  /* ── DRAGÓN / CUEVA ───────────────────────────────────────── */
  .beast-center{ text-align:center; margin:0 auto 14px; }
  .beastwrap{ position:relative; display:inline-block; }
  pre.beast{ font-size:13px; line-height:1.05; white-space:pre; text-align:left;
    display:inline-block; color:var(--grn);
    filter:drop-shadow(0 0 8px rgba(51,255,102,.5)); transition:color .4s; }
  /* estados */
  .beastwrap.asleep   pre.beast{ color:var(--grn-dim); filter:drop-shadow(0 0 6px rgba(255,176,0,.22)); animation:breathe 4s ease-in-out infinite; }
  .beastwrap.waking   pre.beast{ color:var(--amber);   filter:drop-shadow(0 0 10px rgba(255,176,0,.6)); animation:shake .28s steps(2) infinite; }
  .beastwrap.sleeping pre.beast{ color:var(--amber);   filter:drop-shadow(0 0 8px rgba(255,176,0,.45)); animation:breathe 1.5s ease-in-out infinite; }
  .beastwrap.awake    pre.beast{ color:var(--grn);     filter:drop-shadow(0 0 11px rgba(51,255,102,.7)); animation:bob 3s ease-in-out infinite; }
  .beastwrap.unknown  pre.beast{ color:var(--grn-dim); }
  @keyframes breathe{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
  @keyframes bob{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes shake{ 0%{transform:translate(-2px,0) rotate(-1deg)} 50%{transform:translate(2px,-1px) rotate(1deg)} 100%{transform:translate(-2px,0) rotate(-1deg)} }
  /* zzz que suben de la cueva (solo dormido) */
  .zzz{ position:absolute; top:-10px; left:60%; pointer-events:none; opacity:0; transition:opacity .4s; }
  .beastwrap.asleep .zzz{ opacity:1; }
  .zzz span{ position:absolute; font-size:18px; color:var(--amber); text-shadow:0 0 8px var(--amber); opacity:0; }
  .zzz span:nth-child(1){ animation:floatz 3.2s ease-in infinite; }
  .zzz span:nth-child(2){ font-size:22px; animation:floatz 3.2s ease-in infinite 1.05s; }
  .zzz span:nth-child(3){ font-size:27px; animation:floatz 3.2s ease-in infinite 2.1s; }
  @keyframes floatz{ 0%{opacity:0; transform:translate(0,8px) scale(.7)} 22%{opacity:1} 100%{opacity:0; transform:translate(16px,-36px) scale(1.15)} }
  /* radar de escaneo (mientras comprueba) */
  .beastwrap.scan::after{
    content:""; position:absolute; inset:-14px; border-radius:50%;
    border:2px solid rgba(255,176,0,.5); animation:radar 1.1s ease-out infinite;
  }
  @keyframes radar{ 0%{transform:scale(.5); opacity:.9} 100%{transform:scale(1.25); opacity:0} }

  .title{ font-size:30px; letter-spacing:3px; text-align:center; margin-bottom:2px; }
  .sub{ font-size:18px; color:var(--grn-dim); text-align:center; letter-spacing:1px; margin-bottom:18px; }
  .term{ font-size:20px; line-height:1.5; min-height:120px; }
  .line{ white-space:pre-wrap; }
  .dim{ color:var(--grn-dim); }
  .prompt-big{ font-size:28px; letter-spacing:2px; margin:20px 0 14px; text-align:center; min-height:34px; }
  .blink::after{ content:"_"; animation:bl 1s steps(2) infinite; }
  @keyframes bl{ 50%{opacity:0} }
  .btn-wrap{ display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:6px; }
  .btn-row{ display:flex; justify-content:center; gap:12px; }
  button.beastbtn{
    font-family:inherit; font-size:40px; letter-spacing:4px;
    padding:16px 46px; background:#0a120a; cursor:pointer;
    border:3px solid var(--grn); color:var(--grn);
    text-shadow:0 0 10px var(--grn); box-shadow:0 0 18px rgba(51,255,102,.35), inset 0 0 18px rgba(51,255,102,.12);
    border-radius:6px; transition:transform .08s, box-shadow .2s, background .2s;
    -webkit-tap-highlight-color:transparent;
  }
  button.beastbtn:active{ transform:scale(.94); }
  button.off{ border-color:var(--red); color:var(--red); text-shadow:0 0 10px var(--red);
    box-shadow:0 0 18px rgba(255,59,48,.4), inset 0 0 18px rgba(255,59,48,.12); }
  /* botón COMPROBAR ESTADO (ámbar, con pulso para invitar al toque) */
  button.check{ border-color:var(--amber); color:var(--amber); text-shadow:0 0 10px var(--amber);
    font-size:25px; letter-spacing:2px; padding:16px 26px;
    box-shadow:0 0 16px rgba(255,176,0,.35), inset 0 0 16px rgba(255,176,0,.1);
    animation:cpulse 2s ease-in-out infinite; }
  @keyframes cpulse{ 0%,100%{ box-shadow:0 0 14px rgba(255,176,0,.32), inset 0 0 14px rgba(255,176,0,.1);} 50%{ box-shadow:0 0 28px rgba(255,176,0,.6), inset 0 0 20px rgba(255,176,0,.2);} }
  button.small{ font-size:26px; padding:11px 22px; letter-spacing:2px; }
  /* Panel de estado + resultado de la última operación */
  .panel{ margin-top:20px; border-top:1px solid var(--grn-dim); padding-top:12px; font-size:18px; line-height:1.6; }
  .panel .row{ display:flex; justify-content:space-between; gap:10px; white-space:nowrap; }
  .panel .k{ color:var(--grn-dim); letter-spacing:1px; }
  .panel .v{ text-align:right; overflow:hidden; text-overflow:ellipsis; }
  .v.ok{ color:var(--grn); } .v.warn{ color:var(--amber); } .v.bad{ color:var(--red); }
  .v.asleep{ color:var(--amber); } .v.awake{ color:var(--grn); } .v.unknown{ color:var(--grn-dim); }
  .foot{ text-align:center; font-size:15px; color:var(--grn-dim); margin-top:18px; letter-spacing:1px; }
  .err{ color:var(--red); }
  .hidden{ display:none !important; }
</style>
</head>
<body>
  <div class="crt">

    <div class="beast-center">
      <div class="beastwrap unknown" id="beastwrap">
        <div class="zzz" id="zzz"><span>z</span><span>Z</span><span>z</span></div>
        <pre class="beast" id="beast"></pre>
      </div>
    </div>

    <div class="title">L A · B E S T I A</div>
    <div class="sub">// consola remota v1.3</div>

    <div class="term" id="term"></div>

    <div class="prompt-big" id="prompt"></div>
    <div class="btn-wrap" id="btnwrap"></div>

    <!-- Panel: estado actual + resultado de la última operación (oculto hasta comprobar) -->
    <div class="panel hidden" id="panel">
      <div class="row"><span class="k">ESTADO</span><span class="v unknown" id="st-state">¿?</span></div>
      <div class="row"><span class="k">ÚLTIMA OP</span><span class="v" id="st-op">—</span></div>
    </div>

    <div class="foot" id="foot">··· canal cifrado · ntfy ···</div>
  </div>

<script>
  const WAKE  = "wakemac-x7h3k9q2z4p";
  const SLEEP = "sleepmac-q4w8r2t6y9k3";
  const HB    = "bestiavive-x7h3k9q2z4p";
  const NTFY  = "https://ntfy.sh/";
  const POLL_MS = 20000;   // sondeo cada 20s para no agotar la cuota de ntfy

  // ── ARTE: cueva (dormido), cueva con ojos (despertando/escaneando), dragón (despierto) ──
  const ART = {
    asleep:
`        ▄▄▄▄▄▄▄▄▄▄▄
      ▟█████████████▙
    ▟█████████████████▙
   ███████████████████████
  ████▛▀▀▀▀▀▀▀▀▀▀▀▀▀▛████
  ███▛                ▜███
  ██▛                  ▜██
 ▀▀▀                    ▀▀▀`,
    waking:
`        ▄▄▄▄▄▄▄▄▄▄▄
      ▟█████████████▙
    ▟█████████████████▙
   ███████████████████████
  ████▛▀▀▀▀▀▀▀▀▀▀▀▀▀▛████
  ███▛      ◉    ◉    ▜███
  ██▛                  ▜██
 ▀▀▀                    ▀▀▀`,
    awake:
`   ◤▔◥               ◤▔◥
    ▜██▄▄▄▄▄▄▄▄▄▄▄██▛
     ▜████▀▀▀▀▀████▛
    ▟████  ◉   ◉  ████▙
   █████▏    ▼     ▕█████
    ▜████▄  ▀▀▀   ▄████▛
      ▀▀████████████▀▀
         ▄█▀     ▀█▄`
  };
  ART.sleeping = ART.asleep;
  ART.unknown  = ART.asleep;

  const term=document.getElementById('term');
  const prompt=document.getElementById('prompt');
  const btnwrap=document.getElementById('btnwrap');
  const beast=document.getElementById('beast');
  const beastwrap=document.getElementById('beastwrap');
  const foot=document.getElementById('foot');
  const panel=document.getElementById('panel');
  const stState=document.getElementById('st-state');
  const stOp=document.getElementById('st-op');

  let state="idle";      // idle | awake | asleep | unknown
  let stateSince=0;      // epoch (s) del último cambio de estado conocido
  let busy=false;        // mientras esperamos una transición (on/off)
  let checking=false;    // mientras comprueba el estado
  let pending=null;      // 'on' | 'off' durante la accion
  let lastOp=null;       // {result, text, ts}
  let polling=false;     // si ya arrancó el sondeo periódico

  const sleep=ms=>new Promise(r=>setTimeout(r,ms));
  const hhmm=ts=>{ if(!ts) return ""; const d=new Date(ts*1000);
    return String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0'); };

  function line(txt, cls){ const d=document.createElement('div'); d.className='line '+(cls||''); d.textContent=txt; term.appendChild(d); }
  function clearTerm(){ term.innerHTML=''; }

  function setBeast(key){
    beast.textContent = ART[key] || ART.unknown;
    beastwrap.className = 'beastwrap ' + key + (checking ? ' scan' : '');
  }

  function mkBtn(cls, label, on){ const b=document.createElement('button'); b.className='beastbtn '+cls; b.textContent=label; b.onclick=on; return b; }
  function mkCheckBtn(){ return mkBtn('check', '🔍 COMPROBAR ESTADO', doCheck); }

  async function bootSeq(){
    const lines=[
      "> inicializando consola...",
      "> enlazando canal ntfy... OK",
      "> listo."
    ];
    for(const l of lines){ line(l,'dim'); await sleep(380); }
  }

  // Devuelve {state, time, http}. http=429 => canal saturado; http=0 => sin red.
  async function checkState(){
    try{
      const r=await fetch(NTFY+HB+"/json?poll=1",{cache:"no-store"});
      if(r.status===429) return {state:"quota", time:0, http:429};
      if(!r.ok)          return {state:"error", time:0, http:r.status};
      const lines=(await r.text()).trim().split("\n").filter(Boolean);
      for(let i=lines.length-1;i>=0;i--){
        try{ const d=JSON.parse(lines[i]);
          if(d.event==="message"){
            const age=Math.floor(Date.now()/1000)-(d.time||0);
            const st = age>180 ? "unknown" : (d.message==="asleep" ? "asleep" : "awake");
            return {state:st, time:d.time||0, http:200};
          }
        }catch(e){}
      }
      return {state:"unknown", time:0, http:200};
    }catch(e){ return {state:"error", time:0, http:0}; }
  }

  function renderPanel(){
    const label = state==='awake' ? 'DESPIERTA' : state==='asleep' ? 'DORMIDA' : '¿?';
    stState.className = 'v ' + (state==='awake'?'awake':state==='asleep'?'asleep':'unknown');
    stState.textContent = label + (stateSince ? '  · desde '+hhmm(stateSince) : '');
    if(lastOp){
      stOp.className = 'v ' + (lastOp.result==='ok'?'ok':lastOp.result==='warn'?'warn':'bad');
      stOp.textContent = lastOp.text + (lastOp.ts ? '  · '+hhmm(lastOp.ts) : '');
    }else{ stOp.className='v'; stOp.textContent='—'; }
  }

  function render(){
    btnwrap.innerHTML=''; prompt.className='prompt-big';

    // Mientras comprueba el estado
    if(checking){
      prompt.classList.add('blink');
      prompt.textContent="RASTREANDO A LA BESTIA...";
      setBeast('waking');
      panel.classList.add('hidden');
      return;
    }

    // Transición on/off en curso
    if(busy){
      prompt.classList.add('blink');
      prompt.textContent = pending==='off' ? "DURMIENDO A LA BESTIA..." : "DESPERTANDO A LA BESTIA...";
      setBeast(pending==='off' ? 'sleeping' : 'waking');
      panel.classList.remove('hidden'); renderPanel();
      return;
    }

    // Pantalla inicial: SOLO el botón de comprobar (la info sale después)
    if(state==="idle"){
      setBeast('unknown');
      prompt.textContent="¿CÓMO ESTÁ LA BESTIA?";
      btnwrap.appendChild(mkCheckBtn());
      panel.classList.add('hidden');
      return;
    }

    panel.classList.remove('hidden');

    if(state==="awake"){
      setBeast('awake');
      prompt.textContent="¿QUIERES DORMIR A LA BESTIA?";
      btnwrap.appendChild(mkBtn('off','[ OFF ]', ()=>sendCmd('off')));
    }else if(state==="asleep"){
      setBeast('asleep');
      prompt.textContent="DESPERTAR A LA BESTIA";
      btnwrap.appendChild(mkBtn('','[ ON ]', ()=>sendCmd('on')));
    }else{ // unknown -> permite RE-COMPROBAR (y deja forzar on/off por si acaso)
      setBeast('unknown');
      prompt.textContent="ESTADO NO DETECTADO";
      btnwrap.appendChild(mkCheckBtn());
      const row=document.createElement('div'); row.className='btn-row';
      row.appendChild(mkBtn('small','[ ON ]', ()=>sendCmd('on')));
      row.appendChild(mkBtn('small off','[ OFF ]', ()=>sendCmd('off')));
      btnwrap.appendChild(row);
    }
    renderPanel();
  }

  function setOp(result, text, ts){ lastOp={result, text, ts: ts||Math.floor(Date.now()/1000)}; }

  // Comprobar estado: rastrea y revela la info. Arranca el sondeo periódico la 1ª vez.
  async function doCheck(){
    clearTerm();
    line("> rastreando a la bestia...", 'dim');
    checking=true; render();
    await sleep(750);
    const s=await checkState();
    checking=false;
    if(s.http===429){ foot.innerHTML='<span class="err">⚠ canal saturado (429) · reintenta en unos min</span>'; state='unknown'; }
    else if(s.state==='error'){ foot.innerHTML='<span class="err">sin conexión a ntfy</span>'; state='unknown'; }
    else { foot.textContent='··· canal cifrado · ntfy ···'; state=(s.state==='quota')?'unknown':s.state; stateSince=s.time||0; }
    line("> estado: "+(state==='awake'?'DESPIERTA':state==='asleep'?'DORMIDA':'¿? (sin respuesta clara)'),
         state==='awake'?'':'dim');
    render();
    if(!polling){ polling=true; setInterval(poll, POLL_MS); }
  }

  async function sendCmd(which){
    pending=which; busy=true; render();
    const topic = which==='on' ? WAKE : SLEEP;
    const body  = which==='on' ? 'wake' : 'sleep';
    line("");
    line(which==='on' ? "> DESPERTANDO A LA BESTIA" : "> DURMIENDO A LA BESTIA", '');
    line("> enviando senal por el canal...", 'dim');

    // --- PASO 1: enviar la orden y LEER el resultado HTTP (aquí cazamos el 429) ---
    try{
      const r=await fetch(NTFY+topic,{method:'POST',body:body});
      if(r.status===429){
        line("> [ERROR] CANAL SATURADO (429).", 'err');
        line("> demasiadas senales seguidas; ntfy te limita. Espera unos minutos.", 'dim');
        setOp('bad', (which==='on'?'DESPERTAR':'DORMIR')+': ✗ canal saturado (429)');
        busy=false; pending=null; render(); return;
      }
      if(!r.ok) throw new Error('HTTP '+r.status);
      line("> [OK] senal transmitida correctamente.", '');
    }catch(e){
      line("> [ERROR] no se pudo enviar: "+e.message, 'err');
      setOp('bad', (which==='on'?'DESPERTAR':'DORMIR')+': ✗ '+e.message);
      busy=false; pending=null; render(); return;
    }

    // --- PASO 2: confirmar el RESULTADO leyendo el estado real ---
    line(which==='on' ? "> esperando a que la bestia despierte..." : "> esperando a que la bestia se duerma...", 'dim');
    const target = which==='on' ? "awake" : "asleep";
    let sawQuota=false;
    for(let i=0;i<20;i++){
      await sleep(2000);
      const s=await checkState();
      if(s.http===429){ sawQuota=true; continue; }
      if(s.state===target){
        busy=false; pending=null; state=s.state; stateSince=s.time||Math.floor(Date.now()/1000);
        line(which==='on' ? "> [✓] LA BESTIA HA DESPERTADO." : "> [✓] LA BESTIA DUERME.", '');
        setOp('ok', (which==='on'?'DESPERTADA':'DORMIDA')+' ✓', stateSince);
        render(); return;
      }
    }

    // --- PASO 3: enviada pero SIN confirmar -> diagnóstico claro ---
    busy=false; pending=null; state="unknown";
    if(sawQuota){
      line("> [!] orden enviada, pero ntfy esta saturado (429) y no puedo confirmar.", 'err');
      setOp('warn', (which==='on'?'DESPERTAR':'DORMIR')+': ⏳ sin confirmar (cuota 429)');
    }else if(which==='on'){
      line("> [!] senal enviada, pero la bestia no confirma despertar.", '');
      line("> posible: Pixel dormido/sin WiFi, o el WoL no penetra el reposo.", 'dim');
      setOp('warn', 'DESPERTAR: ⏳ enviada, sin confirmar (¿Pixel?)');
    }else{
      line("> [!] senal enviada, pero la bestia no confirma dormir.", '');
      line("> posible: daemon caido o cuota de ntfy.", 'dim');
      setOp('warn', 'DORMIR: ⏳ enviada, sin confirmar (¿daemon?)');
    }
    render();
  }

  async function poll(){
    if(busy || checking) return;
    const s=await checkState();
    if(s.http===429){ foot.innerHTML='<span class="err">⚠ canal saturado (429) · espera unos min</span>'; return; }
    if(s.state==='error'){ foot.innerHTML='<span class="err">sin conexion a ntfy</span>'; return; }
    foot.textContent='··· canal cifrado · ntfy ···';
    if(s.state==='awake'||s.state==='asleep'){
      if(s.state!==state){ state=s.state; stateSince=s.time||Math.floor(Date.now()/1000); }
      else if(s.time && !stateSince){ stateSince=s.time; }
    }else if(s.state!==state){ state=s.state; }
    render();
  }

  (async function(){
    setBeast('unknown');
    await bootSeq();
    state='idle';
    render();   // muestra SOLO el botón "COMPROBAR ESTADO"; la info sale al pulsarlo
  })();
</script>
</body>
</html>
